<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <title>Image Responsiveness</title>
</head>
<body>
    <img src="2.jpeg" class="img-fluid" alt="Responsive image">
    <h1>Bootstrap Heading</h1>
    <p class="lead">This is a lead paragraph for prominent text.</p>
    <button type="button" class="btn btn-primary">Primary Button</button>
    <button type="button" class="btn btn-secondary">Secondary Button</button>
    <button type="button" class="btn btn-success">Success Button</button>
    <button type="button" class="btn btn-danger">Danger Button</button>
    <button type="button" class="btn btn-outline-secondary btn-sm">Small Outline Button</button>
    <button type="button" class="btn btn-primary">Notifications<span class="badge bg-danger">4</span></button>
    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="3.jpeg" class="d-block w-100" alt="Slide 1">
            </div>
            <div class="carousel-item">
                 <img src="1.jpeg" class="d-block w-100" alt="Slide 2">
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
